name: DevOps Playground CI

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: devops-playground-api
  REGISTRY: ghcr.io/alex-gom98

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}


      - name: Restore dependencies
        run: dotnet restore DevOpsPlayground.sln

      - name: Build solution
        run: dotnet build DevOpsPlayground.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevOpsPlayground.sln --configuration Release --no-build --verbosity normal

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/DevOpsPlayground.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v0.6.0