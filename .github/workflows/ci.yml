name: DevOps Playground CI

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true

      - name: Restore dependencies
        run: dotnet restore DevOpsPlayground.sln

      - name: Build solution
        run: dotnet build DevOpsPlayground.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevOpsPlayground.sln \
          --configuration Release \
          --no-build \
          --verbosity normal

      - name: Build Docker image
        run: |
          docker build \
            -t devops-playground-api:ci \
            -f src/DevOpsPlayground.Api/Dockerfile .