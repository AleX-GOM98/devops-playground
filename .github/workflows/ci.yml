name: DevOps Playground CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x


      - name: Restore dependencies
        run: dotnet restore DevOpsPlayground.sln

      - name: Build solution
        run: dotnet build DevOpsPlayground.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test DevOpsPlayground.sln --configuration Release --no-build --verbosity normal

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/DevOpsPlayground.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/devops-playground-api

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}